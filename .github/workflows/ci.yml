name: Nextblog CI

on:
  pull_request:
    branches: [main]

# This cancels previous runs if you push again to the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Format Check
        run: pnpm run format:check

      - name: Run Lint
        run: pnpm run lint

      - name: Type Check
        run: pnpm exec tsc --noEmit

      - name: Build Project
        run: pnpm run build
        env:
          NEXT_PUBLIC_CONVEX_URL: "https://insightful-pheasant-237.convex.cloud"
          NEXT_PUBLIC_CONVEX_SITE_URL: "https://insightful-pheasant-237.convex.site"
          NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
          BETTER_AUTH_SECRET: "dummy-secret-for-ci-build"
